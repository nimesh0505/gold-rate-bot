name: Daily Gold Rate Bot

on:
  schedule:
    - cron: '0 5 * * *'  # Runs daily at 5:00 AM UTC (10:30 AM IST)
  workflow_dispatch:    # Allow manual triggering
  push:
    branches: [ main ]   # Also run on main branch pushes

jobs:
  fetch-gold-rate:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run tests first
      run: |
        pytest --cov=app --cov-fail-under=100
    
    - name: Run gold rate bot
      env:
        MAILERSEND_API_TOKEN: ${{ secrets.MAILERSEND_API_TOKEN }}
        EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
        EMAIL_TO: ${{ secrets.EMAIL_TO }}
        EMAIL_FROM_NAME: ${{ secrets.EMAIL_FROM_NAME }}
        EMAIL_TO_NAME: ${{ secrets.EMAIL_TO_NAME }}
      run: python -m app.main
